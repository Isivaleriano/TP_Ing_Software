services:
  api:
    image: ${API_IMAGE:-ghcr.io/isivaleriano/tp_ing_software:latest}
    build:
      context: .
      dockerfile: ./api/v1/Dockerfile
    container_name: fastapi_api
    ports:
      - "8000:8000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=15d
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-Software_tp}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: alertingSimplifiedRouting
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: tpsoftware03@gmail.com
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: tpsoftware03@gmail.com
      GF_SMTP_FROM_NAME: "TP Monitoring"
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
      GF_SMTP_SKIP_VERIFY: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  webhook-receiver:
    image: mendhak/http-https-echo:31
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      LOG_IGNORE_PATH: /health
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.7.0
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    restart: unless-stopped
  
  postgres:
    image: postgres:16
    container_name: oilgas_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oilgas
      POSTGRES_PASSWORD: oilgas
      POSTGRES_DB: oilgas
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://oilgas:oilgas@oilgas_postgres:5432/oilgas
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com"
    restart: "no"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://oilgas:oilgas@oilgas_postgres:5432/oilgas
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      POSTGRES_HOST: oilgas_postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: oilgas
      POSTGRES_PASSWORD: oilgas
      POSTGRES_DB: oilgas
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://oilgas:oilgas@oilgas_postgres:5432/oilgas
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      POSTGRES_HOST: oilgas_postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: oilgas
      POSTGRES_PASSWORD: oilgas
      POSTGRES_DB: oilgas
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8090:8080"
    command: webserver
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.49.0
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: oilgas
      MB_DB_PORT: 5432
      MB_DB_USER: oilgas
      MB_DB_PASS: oilgas
      MB_DB_HOST: oilgas_postgres
    depends_on:
      - postgres
    restart: unless-stopped
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:
  airflow-logs:
  metabase-data: 
