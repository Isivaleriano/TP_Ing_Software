apiVersion: 1

groups:
  - orgId: 1
    name: grafana-api-alerts
    folder: TP
    interval: 30s
    rules:

            # API DOWN
      - uid: api-down-grafana
        title: API DOWN GRAFANA
        condition: C
        noDataState: OK
        execErrState: Error
        for: 30s
        annotations:
          summary: "API service is down"
          description: "Prometheus detected that the API service is down."
        labels:
          severity: critical
        notification_settings:
          receiver: email

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: 'max(ALERTS{alertname="Service Down", alertstate="firing"}) or vector(0)'
              instant: true
              range: false

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]

      # HIGH ERROR RATE
      - uid: high-error-rate-grafana
        title: HIGH ERROR RATE
        condition: C
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Error rate is greater than 1%"
        labels:
          severity: warning
        notification_settings:
          receiver: email

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                sum(rate(http_request_duration_seconds_count{status=~"5..",job="api"}[5m]))
                /
                sum(rate(http_request_duration_seconds_count{job="api"}[5m]))
              instant: true

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.01]

      # HIGH FORECAST LATENCY
      - uid: high-forecast-latency-grafana
        title: HIGH FORECAST LATENCY
        condition: C
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Forecast p95 latency is greater than KPI"
        labels:
          severity: warning
        notification_settings:
          receiver: email

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                histogram_quantile(
                  0.95,
                  sum(rate(forecast_duration_seconds_bucket[5m])) by (le)
                )
                and
                sum(rate(forecast_duration_seconds_count[5m])) > 0
              instant: true

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]